            <div style={{ marginTop: 8 }}>
              {docs.map((d, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, padding: '3px 0' }}>
                  <span>📄 {d.name}</span>
                  <button onClick={() => removeDoc(i)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#d32f2f', fontSize: 14, padding: 0 }}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="modal-actions">
          <button className="modal-cancel" onClick={onClose}>Cancel</button>
          <button
            className="modal-confirm"
            disabled={!title.trim() || uploading}
            onClick={() => {
              if (title.trim()) onAdd({ title: title.trim(), category, url, notes, doc_urls: docs });
            }}
          >
            Submit Suggestion
          </button>
        </div>
      </div>
    </div>
  );
}

function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => <div key={t.id} className={`toast ${t.leaving ? 'leaving' : ''}`}>{t.msg}</div>)}
    </div>
  );
}

function AuthScreen() {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");

  const handleEmail = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError("");
    setSuccess("");

    if (mode === "signup") {
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) {
        setError(error.message);
      } else {
        setSuccess("Check your email for a verification link. Click the link, then come back here and sign in.");
      }
    } else {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) setError(error.message);
    }
    setLoading(false);
  };

  return (
    <div className="auth-screen">
      <div className="auth-card">
        <h1>ABBEY CONSULTANTS</h1>
        <p>LinkedIn Content Manager</p>

        <div style={{ display: 'flex', gap: 0, marginBottom: 20, borderRadius: 10, overflow: 'hidden', border: '1px solid #E5E7EB' }}>
          <button
            onClick={() => { setMode("login"); setError(""); setSuccess(""); }}
            style={{
              flex: 1,
              padding: '10px 0',
              fontSize: 14,
              fontWeight: mode === 'login' ? 700 : 400,
              border: 'none',
              cursor: 'pointer',
              fontFamily: 'inherit',
              background: mode === 'login' ? '#2B9348' : '#F3F4F6',
              color: mode === 'login' ? 'white' : '#6B7280',
              transition: 'all 0.15s'
            }}
          >
            Sign In
          </button>
          <button
            onClick={() => { setMode("signup"); setError(""); setSuccess(""); }}
            style={{
              flex: 1,
              padding: '10px 0',
              fontSize: 14,
              fontWeight: mode === 'signup' ? 700 : 400,
              borderLeft: '1px solid #E5E7EB',
              cursor: 'pointer',
              fontFamily: 'inherit',
              background: mode === 'signup' ? '#2B9348' : '#F3F4F6',
              color: mode === 'signup' ? 'white' : '#6B7280',
              transition: 'all 0.15s'
            }}
          >
            Create Account
          </button>
        </div>

        {mode === "signup" && (
          <div style={{ background: '#E8F5E9', border: '1px solid #C8E6C9', borderRadius: 10, padding: '12px 14px', marginBottom: 16, textAlign: 'left' }}>
            <p style={{ fontSize: 12, fontWeight: 600, color: '#1B7A35', margin: '0 0 4px' }}>How sign-up works:</p>
            <p style={{ fontSize: 12, color: '#1B7A35', margin: '0 0 2px' }}>1. Enter your email and choose a password</p>
            <p style={{ fontSize: 12, color: '#1B7A35', margin: '0 0 2px' }}>2. You'll receive a verification email — click the link in it</p>
            <p style={{ fontSize: 12, color: '#1B7A35', margin: 0 }}>3. Come back here and sign in with your email and password</p>
          </div>
        )}

        {error && <p className="auth-error">{error}</p>}
        {success && (
          <div style={{ background: '#E8F5E9', border: '1px solid #C8E6C9', borderRadius: 10, padding: '12px 14px', marginBottom: 12, textAlign: 'left' }}>
            <p style={{ fontSize: 13, fontWeight: 600, color: '#1B7A35', margin: '0 0 4px' }}>Account created!</p>
            <p style={{ fontSize: 12, color: '#2B5A3B', margin: 0 }}>{success}</p>
          </div>
        )}

        {!success && (
          <form onSubmit={handleEmail}>
            <input className="auth-input" type="email" placeholder="Email address" value={email} onChange={(e) => setEmail(e.target.value)} required />
            <input className="auth-input" type="password" placeholder={mode === "signup" ? "Choose a password (min 6 chars)" : "Password"} value={password} onChange={(e) => setPassword(e.target.value)} required minLength={6} />
            <button className="auth-btn" type="submit" disabled={loading}>
              {loading ? "..." : (mode === "signup" ? "Create Account" : "Sign In")}
            </button>
          </form>
        )}

        {success && (
          <button className="auth-btn" onClick={() => { setMode("login"); setSuccess(""); }} style={{ marginTop: 8 }}>
            Go to Sign In
          </button>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   MAIN APP
   ============================================================ */
function App() {
  const [user, setUser] = useState(undefined);
  const [tasks, setTasks] = useState([]);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [activeCategory, setActiveCategory] = useState("All");
  const [search, setSearch] = useState("");
  const [statusFilter, setStatusFilter] = useState("all");
  const [priorityFilter, setPriorityFilter] = useState("all");
  const [showNew, setShowNew] = useState(false);
  const [showSuggest, setShowSuggest] = useState(false);
  const [sortBy, setSortBy] = useState("priority");
  const [synced, setSynced] = useState(false);
  const [newCatName, setNewCatName] = useState("");
  const [editingCat, setEditingCat] = useState(null);
  const [selected, setSelected] = useState(new Set());
  const { starred, toggle: toggleStar } = useStarred();
  const { toasts, add: addToast } = useToast();
  const searchRef = useRef(null);

  // Keyboard shortcuts
  useEffect(() => {
    const h = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.key === 'n' && !e.metaKey && !e.ctrlKey) { e.preventDefault(); setShowNew(true); }
      if (e.key === '/' && !e.metaKey && !e.ctrlKey) { e.preventDefault(); searchRef.current?.focus(); }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  // Auth
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => setUser(session?.user || null));
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_, session) => setUser(session?.user || null));
    return () => subscription.unsubscribe();
  }, []);

  // Load tasks + real-time
  useEffect(() => {
    if (!user) return;
    const loadTasks = async () => {
      const { data, error } = await supabase.from('tasks').select('*').order('created_at', { ascending: true });
      if (!error && data) {
        setTasks(data);
        setSynced(true);
      }
    };
    loadTasks();
    const channel = supabase.channel('tasks-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, (payload) => {
      if (payload.eventType === 'INSERT') setTasks(prev => [...prev.filter(t => t.id !== payload.new.id), payload.new]);
      if (payload.eventType === 'UPDATE') setTasks(prev => prev.map(t => t.id === payload.new.id ? payload.new : t));
      if (payload.eventType === 'DELETE') setTasks(prev => prev.filter(t => t.id !== payload.old.id));
    }).subscribe();
    supabase.from('meta').select('*').eq('key', 'categories').single().then(({ data }) => { if (data?.value) setCategories(data.value); });
    const catChannel = supabase.channel('meta-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'meta', filter: 'key=eq.categories' }, (payload) => {
      if (payload.new?.value) setCategories(payload.new.value);
    }).subscribe();
    return () => { supabase.removeChannel(channel); supabase.removeChannel(catChannel); };
  }, [user]);

  const updateTask = async (updated) => {
    const { id, ...data } = updated;
    setTasks(prev => prev.map(t => t.id === id ? updated : t));
    await supabase.from('tasks').update(data).eq('id', id);
  };

  const deleteTask = async (id) => {
    const task = tasks.find(t => t.id === id);
    if (task?.image_urls) { for (const img of task.image_urls) { await supabase.storage.from('assets').remove([img.path]); } }
    if (task?.doc_urls) { for (const doc of task.doc_urls) { await supabase.storage.from('assets').remove([doc.path]); } }
    setTasks(prev => prev.filter(t => t.id !== id));
    await supabase.from('tasks').delete().eq('id', id);
    addToast("Post deleted");
  };

  const addTask = async ({ title, category, priority, doc_urls }) => {
    await supabase.from('tasks').insert({
      title,
      category,
      status: 'todo',
      priority,
      deadline: '',
      description: '',
      notes: '',
      captions: { ...EMPTY_CAPTIONS },
      subtasks: [],
      image_urls: [],
      doc_urls: doc_urls || [],
      review_status: 'none',
      review_notes: [],
      media_type: 'single',
      user_id: user.id
    });
    setShowNew(false);
    addToast(`"${title}" added`);
  };

  const suggestPost = async ({ title, category, url, notes, doc_urls }) => {
    const note = url ? `💡 Suggested by ${user.email}\nResource: ${url}${notes ? '\nContext: ' + notes : ''}` : `💡 Suggested by ${user.email}${notes ? '\nContext: ' + notes : ''}`;
    await supabase.from('tasks').insert({
      title,
      category,
      status: 'todo',
      priority: 'low',
      deadline: '',
      description: '',
      notes: note,
      captions: { ...EMPTY_CAPTIONS },
      subtasks: [],
      image_urls: [],
      doc_urls: doc_urls || [],
      review_status: 'none',
      review_notes: [],
      media_type: 'single',
      user_id: user.id
    });
    setShowSuggest(false);
    addToast(`Suggestion added`);
  };

  const saveCategories = async (cats) => { setCategories(cats); await supabase.from('meta').upsert({ key: 'categories', value: cats }); };
  const addCategory = () => { const n = newCatName.trim(); if (!n || categories.includes(n)) return; saveCategories([...categories, n]); setNewCatName(""); addToast(`Category "${n}" added`); };
  const renameCategory = async (oldName, newName) => {
    if (categories.includes(newName)) { alert(`"${newName}" exists.`); return; }
    const newCats = categories.map(c => c === oldName ? newName : c);
    const toUpdate = tasks.filter(t => t.category === oldName);
    for (const t of toUpdate) { await supabase.from('tasks').update({ category: newName }).eq('id', t.id); }
    await saveCategories(newCats);
    if (activeCategory === oldName) setActiveCategory(newName);
  };
  const deleteCategory = async (cat) => {
    const target = categories.find(c => c !== cat) || "Uncategorized";
    if (!confirm(`Delete "${cat}"? Posts move to "${target}".`)) return;
    const toUpdate = tasks.filter(t => t.category === cat);
    for (const t of toUpdate) { await supabase.from('tasks').update({ category: target }).eq('id', t.id); }
    await saveCategories(categories.filter(c => c !== cat));
    if (activeCategory === cat) setActiveCategory("All");
  };

  const signOut = () => supabase.auth.signOut();

  if (user === undefined) return <div className="loading-screen">Loading...</div>;
  if (user === null) return <AuthScreen />;

  // Filter + sort
  const filtered = tasks
    .filter(t => activeCategory === "All" || (activeCategory === "Starred" ? starred.has(t.id) : activeCategory === "In Review" ? (t.review_status && t.review_status !== 'none' && t.review_status !== 'approved') : t.category === activeCategory))
    .filter(t => statusFilter === "all" || t.status === statusFilter)
    .filter(t => priorityFilter === "all" || t.priority === priorityFilter)
    .filter(t => {
      if (!search) return true;
      const q = search.toLowerCase();
      return t.title?.toLowerCase().includes(q) || t.description?.toLowerCase().includes(q) || t.notes?.toLowerCase().includes(q);
    })
    .sort((a, b) => {
      const aS = starred.has(a.id) ? 0 : 1;
      const bS = starred.has(b.id) ? 0 : 1;
      if (aS !== bS) return aS - bS;
      const aD = a.status === 'done' ? 1 : 0;
      const bD = b.status === 'done' ? 1 : 0;
      if (aD !== bD) return aD - bD;
      // Smart sorting: review_status takes priority
      const reviewOrder = (t) => {
        if (t.review_status === 'submitted' || t.review_status === 'resubmitted') return 0; // Top priority - needs review
        if (t.review_status === 'approved') return 1; // Second priority - approved
        if (t.review_status === 'needs_changes') return 2; // Third priority - needs changes
        return 3; // Regular posts at bottom
      };
      const aR = reviewOrder(a);
      const bR = reviewOrder(b);
      if (aR !== bR) return aR - bR;
      if (sortBy === "priority") {
        const o = { high: 0, medium: 1, low: 2 };
        const ap = o[a.priority] ?? 1;
        const bp = o[b.priority] ?? 1;
        if (ap !== bp) return ap - bp;
        const so = { in_progress: 0, todo: 1, waiting: 2 };
        return (so[a.status] ?? 1) - (so[b.status] ?? 1);
      }
      if (sortBy === "status") { const o = { in_progress: 0, todo: 1, waiting: 2, done: 3 }; return (o[a.status] || 1) - (o[b.status] || 1); }
      if (sortBy === "deadline") { const aD = a.deadline || "zzz"; const bD = b.deadline || "zzz"; return aD.localeCompare(bD); }
      return (a.title || "").localeCompare(b.title || "");
    });

  const stats = {
    done: tasks.filter(t => t.status === "done").length,
    inProgress: tasks.filter(t => t.status === "in_progress").length,
    waiting: tasks.filter(t => t.status === "waiting").length,
    todo: tasks.filter(t => t.status === "todo").length,
    inReview: tasks.filter(t => t.review_status && t.review_status !== 'none' && t.review_status !== 'approved').length
  };

  const toggleStatusFilter = (status) => {
    const mapped = { inProgress: "in_progress", waiting: "waiting", todo: "todo", done: "done" }[status];
    setStatusFilter(prev => prev === mapped ? "all" : mapped);
  };

  const toggleTaskSelection = (taskId) => {
    setSelected(prev => {
      const newSet = new Set(prev);
      if (newSet.has(taskId)) newSet.delete(taskId);
      else newSet.add(taskId);
      return newSet;
    });
  };

  const toggleSelectAll = () => {
    if (selected.size === filtered.length && filtered.length > 0) {
      setSelected(new Set());
    } else {
      setSelected(new Set(filtered.map(t => t.id)));
    }
  };

  const bulkSendForReview = async () => {
    for (const taskId of selected) {
      const task = tasks.find(t => t.id === taskId);
      if (task) {
        await updateTask({ ...task, review_status: 'submitted' });
      }
    }
    setSelected(new Set());
    addToast(`${selected.size} post(s) sent for review`);
  };

  const bulkMarkDone = async () => {
    for (const taskId of selected) {
      const task = tasks.find(t => t.id === taskId);
      if (task) {
        await updateTask({ ...task, status: 'done' });
      }
    }
    setSelected(new Set());
    addToast(`${selected.size} post(s) marked as done`);
  };

  const deselectAll = () => {
    setSelected(new Set());
  };

  return (
    <div className="app">
      <header className="header">
        <div className="header-inner">
          <div className="logo">
            <svg width="38" height="38" viewBox="0 0 100 100" style={{flexShrink:0}}>
              <defs>
                <linearGradient id="taupeGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#B8A99A"/><stop offset="100%" stopColor="#8C7B6B"/></linearGradient>
                <linearGradient id="greenGrad" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stopColor="#1B7A35"/><stop offset="100%" stopColor="#2B9348"/></linearGradient>
              </defs>
              <path d="M15 85 Q10 88 18 78 L48 12 Q52 5 54 12 L60 30 Q50 55 30 78 Q22 88 15 85Z" fill="url(#taupeGrad)"/>
              <path d="M50 28 L58 12 Q62 5 64 12 L85 78 Q90 88 82 85 Q70 80 58 65 Q48 50 50 28Z" fill="url(#greenGrad)"/>
            </svg>
            <div>
              <div className="logo-text">ABBEY <span className="logo-text-light">CONSULTANTS</span></div>
              <div className="header-sub"><span className={`sync-dot`} style={{ background: synced ? '#22c55e' : '#ef4444' }} />{synced ? "Live — syncing" : "Connecting..."}</div>
            </div>
          </div>
          <div className="header-right">
            <div className="stat-badges">
              <span className="stat-badge" onClick={() => toggleStatusFilter('inProgress')}>{stats.inProgress} active</span>
              <span className="stat-badge" onClick={() => toggleStatusFilter('waiting')}>{stats.waiting} waiting</span>
              <span className="stat-badge" onClick={() => toggleStatusFilter('todo')}>{stats.todo} to do</span>
              <span className="stat-badge" onClick={() => toggleStatusFilter('done')}>{stats.done} done</span>
              <span className="stat-badge" style={{ background: '#DBEAFE', color: '#1d4ed8', borderColor: '#93c5fd' }} onClick={() => setActiveCategory("In Review")}>{stats.inReview} in review</span>
            </div>
            <button className="btn-secondary" onClick={() => setShowSuggest(true)}>{IC.plus} Suggest a Post</button>
            <button className="btn-primary" onClick={() => setShowNew(true)}>{IC.plus} New Post</button>
            <div className="user-pill"><span>{user.email || "User"}</span><button className="signout-btn" onClick={signOut}>Sign out</button></div>
          </div>
        </div>
      </header>

      <div className="layout">
        <aside className="sidebar">
          <div className="sidebar-section">
            <div className="sidebar-label">Views</div>
            <button className={`sidebar-btn ${activeCategory === "All" ? 'active' : ''}`} onClick={() => setActiveCategory("All")}><span>All Posts</span><span className="sidebar-count">{tasks.length}</span></button>
            <button className={`sidebar-btn ${activeCategory === "Starred" ? 'active' : ''}`} onClick={() => setActiveCategory("Starred")}><span>★ Starred</span><span className="sidebar-count">{starred.size}</span></button>
            <button className={`sidebar-btn ${activeCategory === "In Review" ? 'active' : ''}`} onClick={() => setActiveCategory("In Review")}><span>🔍 In Review</span><span className="sidebar-count">{tasks.filter(t => t.review_status && t.review_status !== 'none' && t.review_status !== 'approved').length}</span></button>
          </div>
          <div className="sidebar-section">
            <div className="sidebar-label">Categories</div>
            {categories.map(cat => {
              const catTasks = tasks.filter(t => t.category === cat);
              const highCount = catTasks.filter(t => t.priority === 'high' && t.status !== 'done').length;
              return (
                <div key={cat} className="sidebar-cat-row" style={{ display: 'flex', alignItems: 'center', gap: '2px', marginBottom: 4 }}>
                  {editingCat === cat ? (
                    <input
                      className="field-input"
                      style={{ flex: 1, fontSize: 12, padding: '4px 8px' }}
                      defaultValue={cat}
                      autoFocus
                      onBlur={(e) => { const v = e.target.value.trim(); if (v && v !== cat) renameCategory(cat, v); setEditingCat(null); }}
                      onKeyDown={(e) => { if (e.key === 'Enter') { const v = e.target.value.trim(); if (v && v !== cat) renameCategory(cat, v); setEditingCat(null); } if (e.key === 'Escape') setEditingCat(null); }}
                    />
                  ) : (
                    <>
                      <button className={`sidebar-btn ${activeCategory === cat ? 'active' : ''}`} onClick={() => setActiveCategory(cat)} style={{ flex: 1 }}>
                        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{cat}</span>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                          {highCount > 0 && <span style={{ fontSize: 9, fontWeight: 700, color: '#ef4444', background: '#fef2f2', padding: '1px 5px', borderRadius: 999 }}>{highCount}</span>}
                          <span className="sidebar-count">{catTasks.length}</span>
                        </span>
                      </button>
                      <button className="cat-action-btn" onClick={() => setEditingCat(cat)} title="Rename">{IC.edit}</button>
                      <button className="cat-action-btn cat-del" onClick={() => deleteCategory(cat)} title="Delete">{IC.x}</button>
                    </>
                  )}
                </div>
              );
            })}
            <div style={{ display: 'flex', gap: 4, marginTop: 8 }}>
              <input className="field-input" style={{ flex: 1, fontSize: 12, padding: '4px 8px' }} placeholder="New category..." value={newCatName} onChange={(e) => setNewCatName(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') addCategory(); }} />
              <button style={{ background: '#2B9348', color: 'white', border: 'none', borderRadius: 6, padding: '4px 8px', fontSize: 11, cursor: 'pointer', fontWeight: 600, fontFamily: 'inherit' }} disabled={!newCatName.trim()} onClick={addCategory}>Add</button>
            </div>
          </div>
        </aside>

        <main className="main">
          <div className="filters">
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, flex: 1 }}>
              <input type="checkbox" className="select-check" checked={selected.size === filtered.length && filtered.length > 0} onChange={toggleSelectAll} title="Select all visible posts" />
              <div className="search-wrap">{IC.search}<input ref={searchRef} className="search-input" placeholder="Search posts..." value={search} onChange={(e) => setSearch(e.target.value)} /></div>
            </div>
            <select className="filter-select" value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)}><option value="all">All Statuses</option>{STATUSES.map(s => <option key={s} value={s}>{STATUS_LABELS[s]}</option>)}</select>
            <select className="filter-select" value={priorityFilter} onChange={(e) => setPriorityFilter(e.target.value)}><option value="all">All Priorities</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
            <select className="filter-select" value={sortBy} onChange={(e) => setSortBy(e.target.value)}><option value="priority">Sort: Priority</option><option value="status">Sort: Status</option><option value="title">Sort: Title</option><option value="deadline">Sort: Deadline</option></select>
            <span className="results-count">{filtered.length} of {tasks.length} posts</span>
          </div>

          {selected.size > 0 && (
            <div className="bulk-bar">
              <span className="bulk-count">{selected.size} selected</span>
              <button className="bulk-btn bulk-btn-review" onClick={bulkSendForReview}>Send for Review</button>
              <button className="bulk-btn bulk-btn-done" onClick={bulkMarkDone}>Mark Done</button>
              <button className="bulk-btn bulk-btn-deselect" onClick={deselectAll}>Deselect All</button>
            </div>
          )}

          {filtered.length === 0 ? (
            <div className="empty-state">📝 No posts found. Create one to get started.</div>
          ) : (
            filtered.map(task => (
              <TaskCard
                key={task.id}
                task={task}
                onUpdate={updateTask}
                onDelete={deleteTask}
                categories={categories}
                isStarred={starred.has(task.id)}
                onToggleStar={toggleStar}
                userEmail={user.email}
                addToast={addToast}
                isSelected={selected.has(task.id)}
                onToggleSelect={() => toggleTaskSelection(task.id)}
              />
            ))
          )}
        </main>
      </div>

      {showNew && <NewTaskModal onAdd={addTask} onClose={() => setShowNew(false)} categories={categories} />}
      {showSuggest && <SuggestPostModal onAdd={suggestPost} onClose={() => setShowSuggest(false)} categories={categories} />}
      <ToastContainer toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
